<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>张三的家庭群</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        

        

        
        /* 千问推广条 */
        .promo-bar {
            background: linear-gradient(135deg, #F0F0FF 0%, #E6D7F0 100%);
            border-bottom: 1px solid #eee;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }
        
        .promo-content {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 10px;
        }
        
        .promo-logo {
            display: flex;
            align-items: center;
        }
        
        .promo-logo img {
            height: 24px;
            width: auto;
        }
        
        .promo-text {
            flex: 1;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .promo-button {
            background: #9370DB;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .promo-close {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
        }
        
        /* 聊天内容区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }
        
        .date-time {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin: 10px 0;
        }
        
        .message {
            display: flex;
            margin-bottom: 15px;
            max-width: 70%;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message.other {
            align-self: flex-start;
        }
        
        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .message.user .message-content {
            background: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.other .message-content {
            background: white;
            border-bottom-left-radius: 5px;
        }
        
        .message-text {
            font-size: 15px;
            word-break: break-word;
        }
        
        .message-info {
            display: flex;
            align-items: center;
            margin-top: 5px;
            font-size: 12px;
            color: #999;
        }
        
        .message-user {
            font-weight: 500;
            margin-right: 8px;
        }
        
        .unread {
            color: #1E90FF;
            font-size: 12px;
            margin-right: 8px;
        }
        
        /* 底部输入区域 */
        .input-container {
            background: #fff;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #eee;
        }
        
        .voice-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
        }
        
        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-radius: 20px;
            padding: 8px 12px;
        }
        
        .message-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            padding: 8px 0;
            font-family: inherit;
        }
        
        .add-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
        }
        
        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        

        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .message {
                max-width: 80%;
            }
            
            .header {
                padding: 10px 12px;
            }
            
            .chat-container {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    

    
    <!-- 千问推广条 -->
    <div class="promo-bar" id="promoBar">
        <div class="promo-content">
            <div class="promo-logo">
                <img src="images/千问logo.png" alt="千问" />
            </div>
            <div class="promo-text">
                千问 - 助力家长辅助孩子成长
            </div>
            <button class="promo-button">去下载</button>
            <div class="promo-close" id="promoClose">
                <i class="fas fa-times"></i>
            </div>
        </div>
    </div>
    
    <!-- 聊天内容区域 -->
    <div class="chat-container">
        <div class="date-time">今天 18:40</div>
        
        <div class="message user">
            <div class="message-content">
                <div class="message-text">千问好不好用</div>
            </div>
        </div>
    </div>
    
    <!-- 底部输入区域 -->
    <div class="input-container">
        <button class="voice-button">
            <i class="fas fa-microphone"></i>
        </button>
        
        <div class="input-wrapper">
            <input type="text" class="message-input" placeholder="给孩子留个言吧!" id="messageInput">
        </div>
        
        <button class="add-button">
            <i class="fas fa-plus"></i>
        </button>
        
        <button class="send-button">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
    

    
    <script>
        // 简单的交互效果
        document.addEventListener('DOMContentLoaded', function() {
            // 发送按钮
            document.querySelector('.send-button').addEventListener('click', function() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (text) {
                    alert('发送消息: ' + text);
                    input.value = '';
                }
            });
            
            // 语音按钮
            document.querySelector('.voice-button').addEventListener('click', function() {
                alert('语音输入');
            });
            
            // 添加按钮
            document.querySelector('.add-button').addEventListener('click', function() {
                alert('添加附件');
            });
            

            
            // 关闭推广条
            document.getElementById('promoClose').addEventListener('click', function() {
                document.getElementById('promoBar').style.display = 'none';
            });
            
            // 下载按钮点击跳转
            document.querySelector('.promo-button').addEventListener('click', function() {
                window.location.href = 'https://m.tongyi.com/app/tongyi/tongyi-hybrid/download-guide?app_url=tongyi%3A%2F%2F%3Fsid%3Dundefined%26source_type%3Dscheme';
            });
        });
    </script>
</body>
</html>
